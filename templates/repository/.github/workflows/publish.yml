name: Publish reviewed release
run-name: lenso-publish-requested:${{ inputs.event_id }}
on:
  workflow_dispatch:
    inputs:
      event_id: { required: true, type: string }
      plan_id: { required: true, type: string }
      plan_sha256: { required: true, type: string }
      release_commit: { required: true, type: string }
      packages_json: { required: true, type: string }
      nonce: { required: true, type: string }
permissions: {}
concurrency:
  group: lenso-publish-${{ inputs.plan_id }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b
        id: app
        with:
          app-id: ${{ vars.LENSO_RELEASE_APP_ID }}
          private-key: ${{ secrets.LENSO_RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-metadata: read
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ inputs.release_commit }}
          persist-credentials: false
      - uses: pnpm/action-setup@f2b2b233b538f500472c7274c7012f57857d8ce0
        with:
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Install reviewed publishing toolchains
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          npm install --global npm@11.7.0
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
      - name: Complete fail-closed preflight before any registry OIDC
        env:
          INPUT_EVENT_ID: ${{ inputs.event_id }}
          INPUT_PLAN_ID: ${{ inputs.plan_id }}
          INPUT_PLAN_SHA256: ${{ inputs.plan_sha256 }}
          INPUT_RELEASE_COMMIT: ${{ inputs.release_commit }}
          INPUT_PACKAGES_JSON: ${{ inputs.packages_json }}
          INPUT_NONCE: ${{ inputs.nonce }}
          LENSO_APP_TOKEN: ${{ steps.app.outputs.token }}
          LENSO_COORDINATOR_PREFLIGHT_URL: ${{ vars.LENSO_COORDINATOR_PREFLIGHT_URL }}
          RUNNER_IMAGE: ubuntu-24.04
        run: node .lenso-release/runtime/lib/repository/cli.js preflight
      - name: Atomically consume proof and seal exact registry artifacts
        env:
          INPUT_EVENT_ID: ${{ inputs.event_id }}
          INPUT_PLAN_ID: ${{ inputs.plan_id }}
          INPUT_PLAN_SHA256: ${{ inputs.plan_sha256 }}
          INPUT_RELEASE_COMMIT: ${{ inputs.release_commit }}
          INPUT_PACKAGES_JSON: ${{ inputs.packages_json }}
          INPUT_NONCE: ${{ inputs.nonce }}
          LENSO_APP_TOKEN: ${{ steps.app.outputs.token }}
          LENSO_COORDINATOR_PREFLIGHT_CONSUME_URL: ${{ vars.LENSO_COORDINATOR_PREFLIGHT_CONSUME_URL }}
          LENSO_PREFLIGHT_AUTHORITY_PUBLIC_KEY: ${{ vars.LENSO_PREFLIGHT_AUTHORITY_PUBLIC_KEY }}
          RUNNER_IMAGE: ubuntu-24.04
        run: node .lenso-release/runtime/lib/repository/cli.js consume-preflight
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18
        if: contains(inputs.packages_json, 'cargo:')
        id: crates-auth
      - name: Publish and confirm receipts
        env:
          INPUT_EVENT_ID: ${{ inputs.event_id }}
          INPUT_PLAN_ID: ${{ inputs.plan_id }}
          INPUT_PLAN_SHA256: ${{ inputs.plan_sha256 }}
          INPUT_RELEASE_COMMIT: ${{ inputs.release_commit }}
          INPUT_PACKAGES_JSON: ${{ inputs.packages_json }}
          INPUT_NONCE: ${{ inputs.nonce }}
          LENSO_APP_ID: ${{ vars.LENSO_RELEASE_APP_ID }}
          LENSO_APP_TOKEN: ${{ steps.app.outputs.token }}
          LENSO_ATTESTATION_TOKEN: ${{ github.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
          LENSO_COORDINATOR_RECEIPT_URL: ${{ vars.LENSO_COORDINATOR_RECEIPT_URL }}
          LENSO_COORDINATOR_PREFLIGHT_CONSUME_URL: ${{ vars.LENSO_COORDINATOR_PREFLIGHT_CONSUME_URL }}
          LENSO_PREFLIGHT_AUTHORITY_PUBLIC_KEY: ${{ vars.LENSO_PREFLIGHT_AUTHORITY_PUBLIC_KEY }}
          RUNNER_IMAGE: ubuntu-24.04
        run: node .lenso-release/runtime/lib/repository/cli.js publish
