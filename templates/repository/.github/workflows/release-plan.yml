name: Build reviewed release plan
on:
  push:
    branches: [main]
    paths:
      - '.tegami/**'
      - '.lenso-release/**'
      - 'package.json'
      - 'Cargo.toml'
      - '**/package.json'
      - '**/Cargo.toml'
permissions: {}
concurrency:
  group: lenso-release-plan-${{ github.repository }}
  cancel-in-progress: false
jobs:
  plan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b
        id: app
        with:
          app-id: ${{ vars.LENSO_RELEASE_APP_ID }}
          private-key: ${{ secrets.LENSO_RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-metadata: read
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: pnpm/action-setup@f2b2b233b538f500472c7274c7012f57857d8ce0
        with:
          run_install: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with: { node-version: 24.18.0, cache: pnpm }
      - name: Install reviewed planning toolchains
        run: |
          corepack enable
          npm install --global npm@11.7.0
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          cargo fetch --locked
      - name: Emit ready event for an approved merged plan
        if: ${{ hashFiles('.lenso-release/plan.json') != '' && hashFiles('.tegami/*.md') == '' }}
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          READY_URL: ${{ vars.LENSO_COORDINATOR_READY_URL }}
          APP_ID: ${{ vars.LENSO_RELEASE_APP_ID }}
        run: |
          node .lenso-release/runtime/lib/repository/ready-event.js > /tmp/ready.json
          curl --fail-with-body --location-trusted=false --proto '=https' \
            -H "Authorization: Bearer $GH_TOKEN" -H 'Content-Type: application/json' \
            --data-binary @/tmp/ready.json "$READY_URL"
      - name: Draft and apply Tegami plan
        id: draft
        if: ${{ hashFiles('.tegami/*.md') != '' }}
        run: |
          node .lenso-release/runtime/lib/repository/cli.js plan
          echo 'created=true' >> "$GITHUB_OUTPUT"
      - name: Create or update the single release PR
        if: ${{ steps.draft.outputs.created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          BRANCH: release/${{ github.event.repository.name }}
        run: |
          git config user.name lenso-release-app[bot]
          git config user.email lenso-release-app[bot]@users.noreply.github.com
          git checkout -B "$BRANCH"
          git add --all
          git commit -m 'chore: apply reviewed release plan'
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          remote_ref="$(git ls-remote --heads "$remote" "refs/heads/$BRANCH")"
          remote_oid="${remote_ref%%[[:space:]]*}"
          if test -n "$remote_oid"; then
            git fetch --no-tags "$remote" "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"
          fi
          git push --force-with-lease="refs/heads/$BRANCH:$remote_oid" "$remote" "$BRANCH"
          pr="$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          if test -z "$pr"; then gh pr create --base main --head "$BRANCH" --title 'chore: apply reviewed release plan' --body 'Generated by the reviewed Lenso release runtime.'; fi
          pr="$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')"
          gh api "repos/$GITHUB_REPOSITORY/pulls/$pr/reviews" --jq '.[] | select(.state == "APPROVED") | .id' | while read -r review; do
            gh api --method PUT "repos/$GITHUB_REPOSITORY/pulls/$pr/reviews/$review/dismissals" -f message='Release plan changed; renew approval against the new plan digest.'
          done
